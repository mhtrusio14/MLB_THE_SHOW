name: run run_ru_predictions_and_irl_stats

on:
  schedule:
    - cron: '0 8 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: checkout repo content
        uses: actions/checkout@v2

      - name: setup python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9.13'
          
      - name: install python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: execute fangraphs script
        env:
          CREDS: ${{ secrets.CREDS }}
        run: python Get_Current_Day_IRL_Stats_Fangraphs.py

      - name: execute RU predictions script
        env:
          CREDS: ${{ secrets.CREDS }}
        run: python Make_RU_Predictions.py
